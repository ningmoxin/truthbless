<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>尋找真幸福</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  overflow: hidden;
}
canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ===== 裝置與佈局 =====
let V = false; // true=直立, false=橫向
let W = 800, H = 450; // 邏輯尺寸
let DPR = 1; // devicePixelRatio
let isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

function resize() {
  const ww = window.innerWidth, wh = window.innerHeight;
  V = wh > ww * 1.1;
  if (V) { W = 450; H = 800; } else { W = 800; H = 450; }
  // 高解析度：用 devicePixelRatio 提升清晰度
  DPR = Math.min(window.devicePixelRatio || 1, 3); // 最高3x，避免過度
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  const scale = Math.min(ww / W, wh / H);
  canvas.style.width = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0); // 縮放繪圖上下文
  updateLayout();
}

// 佈局參數（根據方向計算）
let L = {};
function updateLayout() {
  const cx = W / 2, cy = H / 2;
  if (V) {
    // 直立模式
    L = {
      cx, cy,
      groundY: H * 0.78,     // 地面 y
      skyH: H * 0.75,        // 天空高度
      groundH: H * 0.25,     // 地面高度
      playerStartX: cx,
      playerStartY: H * 0.78 - 50,
      itemMinY: H * 0.2,
      itemMaxY: H * 0.65,
      checkX: W - 175, checkY: 10,
      fontSize: 0.85,         // 字型縮放
      // P3 車道
      lanes: [H * 0.4, H * 0.55, H * 0.7],
      laneTouch: [H * 0.45, H * 0.6], // 觸控分界
      wheelX: cx, wheelY: H * 0.18, wheelR: 35,
      // P4 門
      doorW: 100, doorH: 170, doorGap: 20,
      // P5 steps
      stepDir: 'v', // vertical
    };
  } else {
    // 橫向模式
    L = {
      cx, cy,
      groundY: H * 0.82,
      skyH: H * 0.82,
      groundH: H * 0.18,
      playerStartX: 150,
      playerStartY: H * 0.82 - 50,
      itemMinY: H * 0.25,
      itemMaxY: H * 0.7,
      checkX: W - 195, checkY: 30,
      fontSize: 1,
      lanes: [H * 0.46, H * 0.62, H * 0.78],
      laneTouch: [H * 0.52, H * 0.7],
      wheelX: cx, wheelY: H * 0.24, wheelR: 45,
      doorW: 130, doorH: 250, doorGap: 220,
      stepDir: 'h',
    };
  }
}

resize();
window.addEventListener('resize', resize);

// ===== 狀態 =====
const S = { TITLE:'title', STORY:'story', P1:'p1', P1_INT:'p1_int', P2:'p2', P2_INT:'p2_int', P3:'p3', P4:'p4', P5:'p5', ENDING:'ending' };
let state = S.TITLE, timer = 0, frame = 0, scrollX = 0;

// ===== 輸入 =====
const keys = {};
let clicked = false, clickX = 0, clickY = 0, touchActive = false, touchX = -1, touchY = -1;
let jumpPressed = false; // 手機跳躍
let touchCount = 0; // 同時觸控數量
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });
function gcp(e, t) {
  const r = canvas.getBoundingClientRect();
  // 用邏輯尺寸而非物理像素
  const sx = W / r.width, sy = H / r.height;
  const cx = t ? e.touches[0].clientX : e.clientX;
  const cy = t ? e.touches[0].clientY : e.clientY;
  return [(cx - r.left) * sx, (cy - r.top) * sy];
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  [touchX,touchY] = gcp(e,true);
  touchActive = true;
  touchCount = e.touches.length;
  clicked = true;
  [clickX,clickY] = [touchX,touchY];
  // 檢查是否點到虛擬跳躍按鈕
  if(isGamePhase() && isMobile){
    const jb = getJumpBtnRect();
    if(touchX>=jb.x && touchX<=jb.x+jb.w && touchY>=jb.y && touchY<=jb.y+jb.h){
      jumpPressed = true;
    }
  }
}, {passive:false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); [touchX,touchY]=gcp(e,true); touchCount=e.touches.length; }, {passive:false});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchCount = e.touches.length;
  if(touchCount === 0) touchActive = false;
}, {passive:false});
canvas.addEventListener('click', e => { clicked=true; [clickX,clickY]=gcp(e,false); });

function isGamePhase(){ return state===S.P1||state===S.P2; }
function getJumpBtnRect(){
  const sz = V ? 65 : 60;
  return { x: W - sz - 15, y: L.groundY - sz - 10, w: sz, h: sz };
}
function getMoveZones(){
  // 左右移動觸控區（排除跳躍按鈕區域）
  const midX = V ? W * 0.5 : W * 0.45;
  return { leftMax: midX, rightMin: midX };
}

// ===== 工具 =====
function fs(sz){ return Math.round(sz * L.fontSize); }
function text(t,x,y,sz,col,align='center'){
  ctx.font=`bold ${fs(sz)}px 'Microsoft JhengHei',sans-serif`;
  ctx.fillStyle=col;ctx.textAlign=align;ctx.textBaseline='middle';ctx.fillText(t,x,y);
}
function textShadow(t,x,y,sz,col){
  text(t,x+2,y+2,sz,'rgba(0,0,0,0.4)');text(t,x,y,sz,col);
}
function lerp(a,b,t){return a+(b-a)*t;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function rr(x,y,w,h,r,f,s){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(f){ctx.fillStyle=f;ctx.fill();}if(s){ctx.strokeStyle=s;ctx.lineWidth=2;ctx.stroke();}
}
function btn(t,x,y,w,h,hl=false){rr(x-w/2,y-h/2,w,h,10,hl?'#e8b84a':'#c49332','#8b6914');text(t,x,y,18,'#fff');}
function inRect(px,py,rx,ry,rw,rh){return px>=rx&&px<=rx+rw&&py>=ry&&py<=ry+rh;}

// ===== 粒子 =====
let particles=[];
function addP(x,y,col,n=10,life=40,sz=3){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4-2,col,life,max:life,sz});}
function drawParticles(){
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life--;
    ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(p.life/p.max),0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
}
let lights=Array.from({length:30},()=>({x:Math.random()*800,y:Math.random()*800,vy:.3+Math.random()*.5,sz:1+Math.random()*2,a:Math.random()*Math.PI*2}));
function drawLights(){lights.forEach(l=>{l.y+=l.vy;l.a+=.03;if(l.y>H+10){l.y=-10;l.x=Math.random()*W;}ctx.globalAlpha=.3+.3*Math.sin(l.a);ctx.fillStyle='#ffe8a0';ctx.beginPath();ctx.arc(l.x,l.y,l.sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});}

// ===== 玩家 =====
const P={x:150,y:320,w:30,h:50,vy:0,ground:true,bp:0,spd:4};
function resetP(){Object.assign(P,{x:L.playerStartX,y:L.playerStartY,vy:0,ground:true,bp:0,spd:4});}

function drawPerson(x,y,s=1,bp=0,bright=false){
  ctx.save();ctx.translate(x,y);
  if(bp>0){const bs=10+bp*.4;ctx.fillStyle=`rgb(${160+bp*.5},${100-bp*.5},${60-bp*.3})`;rr(-18*s-bs*.3,-35*s,bs*s,(bs+10)*s,4,ctx.fillStyle);
    if(bp>30){ctx.strokeStyle='#666';ctx.lineWidth=2;for(let i=0;i<Math.floor(bp/25);i++)for(let j=0;j<3;j++){ctx.beginPath();ctx.ellipse(-18*s-bs*.15-j*6,(-25+i*12)*s,4,3,0,0,Math.PI*2);ctx.stroke();}}}
  rr(-10*s,-30*s,20*s,30*s,3,bright?'#4caf50':'#2c3e50');
  ctx.fillStyle=bright?'#ffe0b2':'#e8c39e';ctx.beginPath();ctx.arc(0,-40*s,12*s,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3e2723';ctx.beginPath();ctx.arc(0,-45*s,10*s,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillStyle='#444';ctx.beginPath();ctx.arc(-4*s,-42*s,2*s,0,Math.PI*2);ctx.arc(4*s,-42*s,2*s,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.beginPath();
  if(bright)ctx.arc(0,-37*s,5*s,.1*Math.PI,.9*Math.PI);else if(bp>50)ctx.arc(0,-33*s,4*s,1.1*Math.PI,1.9*Math.PI);else ctx.arc(0,-35*s,3*s,.2*Math.PI,.8*Math.PI);ctx.stroke();
  ctx.fillStyle='#34495e';ctx.fillRect(-8*s,0,6*s,16*s);ctx.fillRect(2*s,0,6*s,16*s);ctx.restore();
}
function drawJesus(x,y){
  ctx.save();ctx.translate(x,y);ctx.fillStyle='rgba(255,230,150,.3)';ctx.beginPath();ctx.arc(0,-45,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f5f0e0';ctx.beginPath();ctx.moveTo(-15,-25);ctx.lineTo(15,-25);ctx.lineTo(22,0);ctx.lineTo(-22,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#e8e0d0';ctx.fillRect(-20,-5,40,5);ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(0,-38,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#6d4c41';ctx.beginPath();ctx.arc(0,-42,10,Math.PI,Math.PI*2);ctx.fill();ctx.fillRect(-10,-42,3,18);ctx.fillRect(7,-42,3,18);
  ctx.fillStyle='#5d4037';ctx.beginPath();ctx.arc(-3,-38,1.5,0,Math.PI*2);ctx.arc(3,-38,1.5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5d4037';ctx.lineWidth=1;ctx.beginPath();ctx.arc(0,-34,4,.1*Math.PI,.9*Math.PI);ctx.stroke();
  ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(-24,-15,5,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ===== 背景 =====
function drawCity(sx,dark=0){
  const d=dark,gy=L.groundY;
  const sg=ctx.createLinearGradient(0,0,0,gy*.8);
  sg.addColorStop(0,`rgb(${140-d*80},${160-d*80},${200-d*80})`);sg.addColorStop(1,`rgb(${200-d*80},${210-d*80},${220-d*80})`);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,gy);
  ctx.fillStyle=`rgba(${100-d*50},${110-d*50},${130-d*50},.5)`;
  for(let i=0;i<12;i++){const bx=((i*120-sx*.2)%960+960)%960-80;ctx.fillRect(bx,gy-(80+Math.sin(i*2.5)*40),50,80+Math.sin(i*2.5)*40);}
  ctx.fillStyle=`rgba(${70-d*40},${80-d*40},${100-d*40},.7)`;
  for(let i=0;i<8;i++){const bx=((i*150-sx*.5)%(W+150)+W+150)%(W+150)-75,bh=100+Math.sin(i*3.7)*50;ctx.fillRect(bx,gy-bh,70,bh);
    ctx.fillStyle=`rgba(255,230,150,${.3+d*.3})`;for(let wy=gy-bh+10;wy<gy-10;wy+=20)for(let wx=bx+10;wx<bx+60;wx+=20)ctx.fillRect(wx,wy,8,8);
    ctx.fillStyle=`rgba(${70-d*40},${80-d*40},${100-d*40},.7)`;}
  ctx.fillStyle=`rgb(${80-d*30},${85-d*30},${90-d*30})`;ctx.fillRect(0,gy,W,H-gy);
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.setLineDash([20,15]);
  ctx.beginPath();ctx.moveTo(0,gy+30);ctx.lineTo(W,gy+30);ctx.stroke();ctx.setLineDash([]);
}

function drawBright(b=1){
  const gy=L.groundY;
  const sg=ctx.createLinearGradient(0,0,0,gy*.8);sg.addColorStop(0,`rgba(135,206,235,${b})`);sg.addColorStop(1,`rgba(255,253,230,${b})`);
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,gy);
  if(b>.5){const a=(b-.5)*2;const gr=ctx.createRadialGradient(W*.8,H*.15,20,W*.8,H*.15,200);
    gr.addColorStop(0,`rgba(255,230,100,${a*.8})`);gr.addColorStop(.3,`rgba(255,200,50,${a*.3})`);gr.addColorStop(1,'rgba(255,200,50,0)');
    ctx.fillStyle=gr;ctx.fillRect(0,0,W,gy);ctx.fillStyle=`rgba(255,220,80,${a})`;ctx.beginPath();ctx.arc(W*.8,H*.15,30,0,Math.PI*2);ctx.fill();}
  const gg=ctx.createLinearGradient(0,gy-20,0,H);gg.addColorStop(0,`rgba(120,180,80,${b})`);gg.addColorStop(1,`rgba(90,150,60,${b})`);
  ctx.fillStyle=gg;ctx.fillRect(0,gy,W,H-gy);
  if(b>.3)for(let i=0;i<20;i++){const fx=(i*42+frame*.2)%W;ctx.fillStyle=`rgba(100,200,80,${b*.7})`;ctx.fillRect(fx,gy-5,2,8);
    if(i%3===0){ctx.fillStyle=`rgba(255,200,100,${b*.8})`;ctx.beginPath();ctx.arc(fx,gy-8,3,0,Math.PI*2);ctx.fill();}}
  if(b>.5)drawLights();
}

// ===== 清單 =====
let checkItems=[{name:'高富帥/白富美',done:false,need:5},{name:'有錢有勢',done:false,need:10},{name:'身體健康',done:false,need:15},{name:'家庭美滿',done:false,need:20}];
let score=0;
function drawChecklist(x,y){
  const cw=V?160:180,ch=V?125:140;
  rr(x,y,cw,ch,8,'rgba(255,248,230,.95)','#c49332');
  text('人生勝利組',x+cw/2,y+16,V?12:14,'#8b6914');
  ctx.strokeStyle='#c49332';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x+8,y+28);ctx.lineTo(x+cw-8,y+28);ctx.stroke();
  checkItems.forEach((it,i)=>{const cy2=y+44+i*(V?22:25);rr(x+10,cy2-8,14,14,2,it.done?'#d4a44a':'#fff','#c49332');
    if(it.done){ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(x+13,cy2);ctx.lineTo(x+16,cy2+4);ctx.lineTo(x+22,cy2-4);ctx.stroke();}
    text(it.name,x+cw/2+8,cy2,V?10:11,'#5a4a2a');});
}

// ===== 收集物 =====
const ITEMS=[{emoji:'💰',col:'#f1c40f'},{emoji:'🏠',col:'#e67e22'},{emoji:'🚗',col:'#e74c3c'},{emoji:'👔',col:'#3498db'},{emoji:'💎',col:'#9b59b6'},{emoji:'🏆',col:'#f39c12'}];
let collectibles=[],negFloats=[],obstacles=[];
function spawnItem(){const t=ITEMS[Math.floor(Math.random()*ITEMS.length)];collectibles.push({x:W+Math.random()*200,y:L.itemMinY+Math.random()*(L.itemMaxY-L.itemMinY),type:t,got:false,bob:Math.random()*Math.PI*2});}

// ===== 災難物件 =====
const DISASTER_TYPES=[
  {emoji:'⚡',icon:'📉',title:'突發事件：公司裁員！',desc:'你失去了工作，收入歸零。',loss:3,warn:'裁員風暴'},
  {emoji:'🏥',icon:'💔',title:'突發事件：家人生病！',desc:'巨額醫療費用，積蓄用盡。',loss:4,warn:'疾病'},
  {emoji:'📉',icon:'📊',title:'突發事件：投資失利！',desc:'股票崩盤，財富蒸發。',loss:5,warn:'股災'},
  {emoji:'🔥',icon:'🏚️',title:'突發事件：天災人禍！',desc:'一場大火燒毀了你的房子。',loss:4,warn:'天災'},
  {emoji:'💔',icon:'😢',title:'突發事件：婚姻危機！',desc:'關係破裂，家庭不再美滿。',loss:3,warn:'婚變'},
  {emoji:'😰',icon:'🏥',title:'突發事件：健康警報！',desc:'過度操勞，身體亮紅燈。',loss:3,warn:'過勞'},
  {emoji:'⚠️',icon:'😱',title:'突發事件：詐騙受害！',desc:'多年積蓄被騙走。',loss:5,warn:'詐騙'},
];
let disasters=[],interruptData=null,interruptTimer=0,disasterCount=0;
function spawnDisaster(){const t=DISASTER_TYPES[Math.floor(Math.random()*DISASTER_TYPES.length)];disasters.push({x:W+Math.random()*100,y:L.itemMinY+Math.random()*(L.itemMaxY-L.itemMinY),type:t,hit:false,bob:Math.random()*Math.PI*2,pulse:0});}

const P2_CRISIS_TYPES=[
  {emoji:'😵',title:'你累垮了！',desc:'過度追求導致身心崩潰...\n你需要停下來，但你停不下來。',warn:'崩潰'},
  {emoji:'💔',title:'關係破裂！',desc:'你太忙了，忽略了身邊的人。\n婚姻亮起紅燈...',warn:'心碎'},
  {emoji:'😰',title:'內心空虛！',desc:'有錢有地位，卻找不到價值。\n夜深人靜時，空虛感襲來...',warn:'空虛'},
  {emoji:'😤',title:'情緒失控！',desc:'壓力太大，你對家人發了脾氣。\n事後卻更加自責...',warn:'暴怒'},
  {emoji:'🫠',title:'迷失方向！',desc:'擁有了這麼多，\n卻不知道自己為什麼而活。',warn:'迷失'},
];
let p2Crises=[],p2IntData=null,p2IntTimer=0,p2IntCount=0;
function spawnP2Crisis(){const t=P2_CRISIS_TYPES[Math.floor(Math.random()*P2_CRISIS_TYPES.length)];p2Crises.push({x:W+Math.random()*80,y:L.itemMinY+Math.random()*(L.itemMaxY-L.itemMinY),type:t,hit:false,bob:Math.random()*Math.PI*2,pulse:0});}

// ===== 故事 =====
const STORIES={
  intro:{lines:['在這個忙碌的世界裡，','每個人都在追尋「幸福」。','','你，也不例外。','','▸ 點擊或按空白鍵開始'],next:S.P1},
  afterP1:{lines:['天有不測風雲...','','你拼命收集了這些「幸福條件」，','但它們隨時可能被奪走。','','就算擁有一切，也無法保證永恆。','','▸ 點擊繼續'],next:S.P2},
  afterP2:{lines:['華麗外表下的沉重背包...','','被賺錢綁架：一心要更多','關係破裂：婚姻、親子衝突不斷','內心空虛：有錢有地位，卻找不到價值','','「追求沒有的，又怕失去擁有的。」','','▸ 點擊繼續'],next:S.P3},
  afterP3:{lines:['為什麼我們這麼努力，','卻還是不快樂？','','重新認識「罪」：','它不是犯罪紀錄，而是斷了線。','','中國的荀子說「人性本惡」。','這就是我們無法逃避的本性。','','▸ 點擊繼續'],next:S.P4},
  afterP4:{lines:['用錯方法的徒勞無功！','','因為用錯了貨幣，找錯了債主。','','我們真正的債主是上帝。','必須使用上帝指定的方法。','','▸ 點擊繼續'],next:S.P5}
};
let curStory=null,storyFade=0;

// ===== Phase vars =====
const OBS_LABELS=['嫉妒','說謊','壞脾氣','貪心','驕傲','酒癮','賭癮','毒癮'];
let obsHits=0,steerAngle=0;
let selDoor=-1,doorPhase=0,doorTimer=0,wrongTries=0;
const DOOR_INFO=[
  {label:'求神拜佛',emoji:'🙏',desc:'你虔誠地拜了又拜...\n但什麼都沒有改變。'},
  {label:'算命改運',emoji:'🔮',desc:'算命師說你要改名、改方位...\n結果還是一樣。'},
  {label:'積功德',emoji:'📿',desc:'你努力做善事...\n但內心的空虛依然存在。'},
];
let p5State=0,p5Timer=0,bright=0;
let endTimer=0,endPhase=0;

// ===== 切換狀態 =====
function go(s,story=null){
  state=s;timer=0;
  if(story){curStory=story;storyFade=0;state=S.STORY;}
  switch(s){
    case S.P1:resetP();collectibles=[];disasters=[];score=0;disasterCount=0;checkItems.forEach(c=>c.done=false);break;
    case S.P2:P.x=V?L.cx:150;P.bp=20;negFloats=[];collectibles=[];p2Crises=[];p2IntCount=0;break;
    case S.P3:resetP();P.y=L.lanes[1];obstacles=[];obsHits=0;steerAngle=0;break;
    case S.P4:selDoor=-1;doorPhase=0;doorTimer=0;wrongTries=0;break;
    case S.P5:p5State=0;p5Timer=0;bright=0;break;
    case S.ENDING:endTimer=0;endPhase=0;resetP();P.bp=0;break;
  }
}

// ===== 移動 =====
function movePlayer(mul=1){
  const spd=P.spd*mul;
  const mz = getMoveZones();
  // 鍵盤
  if(keys['ArrowLeft']||keys['a']) P.x=Math.max(30,P.x-spd);
  if(keys['ArrowRight']||keys['d']) P.x=Math.min(W-30,P.x+spd);
  // 觸控移動（排除跳躍按鈕區域）
  if(touchActive && isMobile){
    const jb = getJumpBtnRect();
    const inJumpBtn = touchX>=jb.x&&touchX<=jb.x+jb.w&&touchY>=jb.y&&touchY<=jb.y+jb.h;
    if(!inJumpBtn){
      if(touchX < mz.leftMax) P.x=Math.max(30,P.x-spd);
      if(touchX > mz.rightMin) P.x=Math.min(W-30,P.x+spd);
    }
  }
  // 非觸控裝置的觸控（滑鼠模擬等）
  if(touchActive && !isMobile){
    if(touchX<W*.4) P.x=Math.max(30,P.x-spd);
    if(touchX>W*.6) P.x=Math.min(W-30,P.x+spd);
  }
  // 跳躍
  if((keys['ArrowUp']||keys[' ']||keys['w']||jumpPressed)&&P.ground){
    P.vy=-10*mul;P.ground=false;keys[' ']=false;jumpPressed=false;
  }
  P.vy+=.5;P.y+=P.vy;
  if(P.y>=L.groundY-P.h){P.y=L.groundY-P.h;P.vy=0;P.ground=true;}
}

// ===== 虛擬按鈕繪製 =====
function drawVirtualControls(){
  if(!isMobile || !isGamePhase()) return;
  const jb = getJumpBtnRect();
  // 跳躍按鈕
  ctx.globalAlpha = 0.35;
  rr(jb.x, jb.y, jb.w, jb.h, 14, 'rgba(255,255,255,0.25)', 'rgba(255,255,255,0.5)');
  ctx.globalAlpha = 0.6;
  // 箭頭↑
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  const cx2 = jb.x+jb.w/2, cy2 = jb.y+jb.h/2;
  ctx.moveTo(cx2, cy2-14);
  ctx.lineTo(cx2+12, cy2+4);
  ctx.lineTo(cx2+4, cy2+4);
  ctx.lineTo(cx2+4, cy2+14);
  ctx.lineTo(cx2-4, cy2+14);
  ctx.lineTo(cx2-4, cy2+4);
  ctx.lineTo(cx2-12, cy2+4);
  ctx.closePath();
  ctx.fill();
  text('跳躍', cx2, cy2+jb.h/2+10, 10, 'rgba(255,255,255,0.4)');
  ctx.globalAlpha = 1;

  // 左右提示箭頭
  ctx.globalAlpha = 0.2;
  // 左
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.moveTo(30, L.groundY + 25);
  ctx.lineTo(50, L.groundY + 15);
  ctx.lineTo(50, L.groundY + 35);
  ctx.closePath();
  ctx.fill();
  // 右
  ctx.beginPath();
  ctx.moveTo(W - 30, L.groundY + 25);
  ctx.lineTo(W - 50, L.groundY + 15);
  ctx.lineTo(W - 50, L.groundY + 35);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
}

let shakeX=0,shakeY=0,shakePow=0;

function updateShake(){if(shakePow>0){shakeX=(Math.random()-.5)*shakePow;shakeY=(Math.random()-.5)*shakePow;shakePow*=.9;if(shakePow<.5)shakePow=0;}else{shakeX=0;shakeY=0;}}
let flashAlpha=0;
function flash(){flashAlpha=.4;}
function drawFlash(){if(flashAlpha>0){ctx.fillStyle=`rgba(255,0,0,${flashAlpha})`;ctx.fillRect(0,0,W,H);flashAlpha-=.015;}}

// ===== 中斷卡片（通用）=====
function drawInterruptCard(icon,title,desc,extraLine,btnText,timer,onContinue){

    if((clicked||keys[' ']||keys['Enter'])&&timer>100){keys[' ']=keys['Enter']=false;onContinue();return true;}}

      if(clicked&&inRect(clickX,clickY,dx,dy,dw,dh)&&wrongTries===i){selDoor=i;doorPhase=1;doorTimer=0;}
    }
    if(wrongTries<3){let hx,hy;if(V){hx=L.cx;hy=80+wrongTries*(L.doorH+L.doorGap)+L.doorH+12;}else{hx=130+wrongTries*L.doorGap+L.doorW/2;hy=100+L.doorH+15;}text(`試試「${DOOR_INFO[wrongTries].label}」？`,hx,hy,11,'rgba(255,220,150,.6)');}
  }else if(doorPhase===1){
    const prog=Math.min(1,doorTimer/70);
    for(let i=0;i<3;i++){
      let dx,dy,dw,dh;if(V){dw=L.doorW;dh=L.doorH;dx=L.cx-dw/2;dy=80+i*(dh+L.doorGap);}else{dw=L.doorW;dh=L.doorH;dx=130+i*L.doorGap;dy=100;}
      ctx.fillStyle='#3a2a1a';ctx.fillRect(dx-5,dy-5,dw+10,dh+10);
      if(i===selDoor){ctx.fillStyle='#111';ctx.fillRect(dx,dy,dw,dh);ctx.fillStyle='#654321';ctx.fillRect(dx,dy,dw*(1-prog*.7),dh);
        if(prog>.5){const ta=(prog-.5)*2;ctx.font='42px serif';ctx.textAlign='center';ctx.globalAlpha=ta;ctx.fillText('❌',dx+dw/2+10,dy+dh/2-15);ctx.globalAlpha=1;text('無效！',dx+dw/2+10,dy+dh/2+30,18,`rgba(255,150,150,${ta})`);}
      }else{ctx.globalAlpha=.3;ctx.fillStyle='#654321';ctx.fillRect(dx,dy,dw,dh);ctx.globalAlpha=1;}
    }
    if(doorTimer>90){doorPhase=2;doorTimer=0;}
  }else if(doorPhase===2){
    const fa=Math.min(1,doorTimer/30);const info=DOOR_INFO[selDoor];
    const cw=Math.min(W-30,450),ch=V?220:200,cx2=L.cx-cw/2,cy2=L.cy-ch/2;
    rr(cx2,cy2,cw,ch,12,`rgba(40,20,20,${fa*.9})`,`rgba(200,100,100,${fa})`);
    ctx.globalAlpha=fa;ctx.font='36px serif';ctx.textAlign='center';ctx.fillText(info.emoji,L.cx,cy2+40);
    text(info.label,L.cx,cy2+70,18,'#ff8888');info.desc.split('\n').forEach((l,i)=>text(l,L.cx,cy2+100+i*25,13,'#ccc'));ctx.globalAlpha=1;
    if(doorTimer>100){const ba=Math.min(1,(doorTimer-100)/30);ctx.globalAlpha=ba;
      btn(wrongTries<2?'再試其他門...':'似乎都沒有用...',L.cx,cy2+ch+20,200,40);ctx.globalAlpha=1;
      if((clicked||keys[' ']||keys['Enter'])&&doorTimer>110){keys[' ']=keys['Enter']=false;wrongTries++;if(wrongTries>=3)go(S.P5,'afterP4');else{doorPhase=0;doorTimer=0;selDoor=-1;}}}
  }
}

// ----- Phase 5 -----
function upP5(){
  timer++;p5Timer++;
  if(p5State===0){
    ctx.fillStyle='#1a1520';ctx.fillRect(0,0,W,H);
    const ga=.3+Math.sin(timer*.03)*.1;const gr=ctx.createRadialGradient(L.cx,L.cy*.7,30,L.cx,L.cy*.7,250);gr.addColorStop(0,`rgba(255,230,150,${ga})`);gr.addColorStop(1,'rgba(255,230,150,0)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);
    if(p5Timer<120)text('但還有一扇門...',L.cx,H*.06,V?18:22,`rgba(255,232,160,${Math.min(1,p5Timer/60)})`);else text('上帝的指定解法',L.cx,H*.06,V?18:22,'#ffe8a0');
    const dw=V?150:180,dh=V?240:280,dx=L.cx-dw/2,dy=V?H*.1:70;
    ctx.shadowColor='#ffe080';ctx.shadowBlur=20+Math.sin(timer*.05)*10;ctx.fillStyle='#c49332';ctx.fillRect(dx-8,dy-8,dw+16,dh+16);ctx.fillStyle='#f5e6c8';ctx.fillRect(dx,dy,dw,dh);ctx.shadowBlur=0;
    ctx.fillStyle='#c49332';ctx.fillRect(dx+dw/2-4,dy+30,8,70);ctx.fillRect(dx+dw/2-22,dy+45,44,8);
    if(p5Timer>60){const a=Math.min(1,(p5Timer-60)/60);const ty=dy+dh/2+15;
      text('「凡勞苦擔重擔的人',L.cx,ty,V?12:14,`rgba(139,105,20,${a})`);text('可以到我這裡來，',L.cx,ty+20,V?12:14,`rgba(139,105,20,${a})`);
      text('我必使你們得安息。」',L.cx,ty+40,V?12:14,`rgba(139,105,20,${a})`);text('—— 馬太福音 11:28',L.cx,ty+65,10,`rgba(160,136,90,${a})`);}
    if(p5Timer>120){const ba=Math.min(1,(p5Timer-120)/40);ctx.globalAlpha=ba;btn('推開這扇門',L.cx,V?H*.88:H*.92,160,45,true);ctx.globalAlpha=1;if(clicked&&p5Timer>130){p5State=1;p5Timer=0;}}
  }else if(p5State===1){
    const prog=Math.min(1,p5Timer/120);bright=ease(prog);
    ctx.fillStyle=`rgba(26,21,32,${1-bright})`;ctx.fillRect(0,0,W,H);drawBright(bright);
    if(bright>.2){const la=(bright-.2)*1.2;const gr=ctx.createRadialGradient(L.cx,L.cy*.7,10,L.cx,L.cy*.7,400);gr.addColorStop(0,`rgba(255,245,200,${la})`);gr.addColorStop(.5,`rgba(255,230,150,${la*.5})`);gr.addColorStop(1,'rgba(255,230,150,0)');ctx.fillStyle=gr;ctx.fillRect(0,0,W,H);}
    const dw=V?150:180,dh=V?240:280,dx=L.cx-dw/2,dy=V?H*.1:70;
    ctx.globalAlpha=1-bright;ctx.fillStyle='#c49332';ctx.fillRect(dx-8,dy-8,dw+16,dh+16);ctx.fillStyle='#f5e6c8';ctx.fillRect(dx,dy,dw*(1-bright*.8),dh);ctx.globalAlpha=1;
    if(p5Timer===40)addP(L.cx*.5,L.cy*.8,'#888',20,60,4);if(p5Timer===60)addP(L.cx*.75,L.cy*.85,'#999',20,60,4);if(p5Timer===80)addP(L.cx*.6,L.cy*.75,'#aaa',15,50,3);
    drawParticles();if(p5Timer>80){const a=Math.min(1,(p5Timer-80)/40);textShadow('你的鎖鏈斷開了！',L.cx,H*.85,V?20:24,`rgba(255,240,200,${a})`);}
    if(p5Timer>160){p5State=2;p5Timer=0;}
  }else if(p5State===2){
    drawBright(1);textShadow('幸福的方程式',L.cx,V?H*.05:45,V?26:32,'#c49332');
    const steps=[{emoji:'🙌',lines:['相信並','倚靠耶穌'],delay:0},{emoji:'📜',lines:['罪債還清','成為上帝兒女'],delay:40},{emoji:'🕊️',lines:['脫離','罪的控制'],delay:80}];
    if(V){// 直立：上下排列
      steps.forEach((st,i)=>{const a=clamp((p5Timer-st.delay)/50,0,1);if(a>0){const sy=H*.18+i*H*.22;ctx.globalAlpha=a;
        ctx.fillStyle='rgba(255,248,230,.9)';ctx.beginPath();ctx.arc(L.cx,sy,45,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#c49332';ctx.lineWidth=3;ctx.stroke();
        ctx.font='30px serif';ctx.textAlign='center';ctx.fillText(st.emoji,L.cx,sy-3);st.lines.forEach((l,li)=>text(l,L.cx,sy+55+li*20,13,'#5a4a2a'));
        if(i<2){ctx.fillStyle=`rgba(196,147,50,${a})`;ctx.beginPath();const ay=sy+85;ctx.moveTo(L.cx,ay);ctx.lineTo(L.cx-8,ay+12);ctx.lineTo(L.cx-3,ay+12);ctx.lineTo(L.cx-3,ay+30);ctx.lineTo(L.cx+3,ay+30);ctx.lineTo(L.cx+3,ay+12);ctx.lineTo(L.cx+8,ay+12);ctx.closePath();ctx.fill();}
        ctx.globalAlpha=1;}});
    }else{// 橫向
      steps.forEach((st,i)=>{const a=clamp((p5Timer-st.delay)/50,0,1);if(a>0){const sx=150+i*250,sy=190;ctx.globalAlpha=a;
        ctx.fillStyle='rgba(255,248,230,.9)';ctx.beginPath();ctx.arc(sx,sy,55,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#c49332';ctx.lineWidth=3;ctx.stroke();
        ctx.font='36px serif';ctx.textAlign='center';ctx.fillText(st.emoji,sx,sy-5);st.lines.forEach((l,li)=>text(l,sx,sy+65+li*22,14,'#5a4a2a'));
        if(i<2){ctx.fillStyle=`rgba(196,147,50,${a})`;ctx.beginPath();ctx.moveTo(sx+70,sy);ctx.lineTo(sx+85,sy-8);ctx.lineTo(sx+85,sy-3);ctx.lineTo(sx+110,sy-3);ctx.lineTo(sx+110,sy+3);ctx.lineTo(sx+85,sy+3);ctx.lineTo(sx+85,sy+8);ctx.closePath();ctx.fill();}
        ctx.globalAlpha=1;}});
    }
    if(p5Timer>140){const a=Math.min(1,(p5Timer-140)/50);const ty=V?H*.82:350;
      text('「凡勞苦擔重擔的人可以到我這裡來，',L.cx,ty,V?11:14,`rgba(139,105,20,${a})`);text('我必使你們得安息。」—— 馬太福音 11:28',L.cx,ty+22,V?10:12,`rgba(160,136,90,${a})`);}
    if(p5Timer>180){const a=Math.min(1,(p5Timer-180)/40);text('接上真正的幸福源頭',L.cx,V?H*.9:410,V?14:16,`rgba(196,147,50,${a})`);
      text('當我們與幸福的源頭接軌，生命就能再次充滿平安與喜樂。',L.cx,V?H*.94:435,V?10:12,`rgba(139,105,20,${a})`);}
    drawLights();if(p5Timer>280||(clicked&&p5Timer>180))go(S.ENDING);
  }
}

// ----- Ending -----
function upEnding(){
  timer++;endTimer++;drawBright(1);
  const gy=L.groundY;
  ctx.fillStyle='#d4b896';ctx.beginPath();ctx.moveTo(0,gy+10);ctx.quadraticCurveTo(W*.25,gy,W*.5,gy+5);ctx.quadraticCurveTo(W*.75,gy+10,W,gy);ctx.lineTo(W,gy+40);ctx.quadraticCurveTo(W*.75,gy+50,W*.5,gy+45);ctx.quadraticCurveTo(W*.25,gy+40,0,gy+50);ctx.closePath();ctx.fill();
  drawLights();
  if(endPhase===0){
    const drop=Math.min(1,endTimer/80);
    if(drop>.3){ctx.globalAlpha=.7;ctx.fillStyle='#a0704a';rr(V?40:100,gy-20,35,40,5,'#a0704a');ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(V?60:120,gy-15);ctx.lineTo(V?78:140,gy-25);ctx.stroke();ctx.globalAlpha=1;}
    const walk=clamp((endTimer-80)/150,0,1);const px=lerp(V?80:160,V?L.cx-30:340,ease(walk));
    const la=.2+Math.sin(endTimer*.03)*.1;const lg=ctx.createLinearGradient(0,0,0,gy);lg.addColorStop(0,`rgba(255,240,180,${la})`);lg.addColorStop(1,'rgba(255,240,180,0)');ctx.fillStyle=lg;ctx.fillRect(px-50,0,180,gy);
    drawJesus(px+65,gy);drawPerson(px,gy,1,0,true);
    if(endTimer>30){const a=Math.min(1,(endTimer-30)/60);textShadow('卸下重擔，成為上帝的兒女',L.cx,V?H*.06:55,V?22:28,`rgba(139,105,20,${a})`);}
    if(endTimer>130){const a=Math.min(1,(endTimer-130)/60);text('真正的幸福，從放下背包，',L.cx,V?H*.12:95,V?13:16,`rgba(100,80,50,${a})`);text('回到天父的家開始。',L.cx,V?H*.15:115,V?13:16,`rgba(100,80,50,${a})`);}
    if(endTimer>280){endPhase=1;endTimer=0;}
  }else if(endPhase===1){
    const a=Math.min(1,endTimer/60);const cg=ctx.createRadialGradient(L.cx,L.cy*.6,30,L.cx,L.cy*.6,300);cg.addColorStop(0,`rgba(255,240,180,${a*.4})`);cg.addColorStop(1,'rgba(255,240,180,0)');ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);
    textShadow('另一種真正幸福的可能',L.cx,V?H*.08:80,V?24:32,`rgba(139,105,20,${a})`);
    if(endTimer>50){const a2=Math.min(1,(endTimer-50)/50);text('即使沒有「人生勝利組」的條件...',L.cx,V?H*.2:160,V?14:17,`rgba(80,70,50,${a2})`);text('即便面對人生的不測風雲...',L.cx,V?H*.24:190,V?14:17,`rgba(80,70,50,${a2})`);}
    if(endTimer>110){const a3=Math.min(1,(endTimer-110)/50);text('你依然可以擁有無法被奪走的',L.cx,V?H*.32:240,V?17:21,`rgba(196,147,50,${a3})`);textShadow('平安與幸福。',L.cx,V?H*.37:275,V?24:28,`rgba(196,147,50,${a3})`);}
    if(endTimer>180){const a4=Math.min(1,(endTimer-180)/50);text('今天，就讓耶穌為你的生命',L.cx,V?H*.46:320,V?14:16,`rgba(139,105,20,${a4})`);text('帶來真正的安息。',L.cx,V?H*.5:345,V?14:16,`rgba(139,105,20,${a4})`);}
    if(endTimer>260){const ba=Math.min(1,(endTimer-260)/40);ctx.globalAlpha=ba;btn('重新體驗',L.cx,V?H*.6:400,140,40);ctx.globalAlpha=1;if(clicked&&endTimer>280){state=S.TITLE;timer=0;resetP();wrongTries=0;}}
  }
}

// ===== 主循環 =====
function loop(){
  frame++;updateShake();
  ctx.setTransform(DPR,0,0,DPR,0,0); // 重設 DPR 縮放
  ctx.save();ctx.translate(shakeX,shakeY);
  switch(state){
    case S.TITLE:upTitle();break;case S.STORY:upStory();break;
    case S.P1:upP1();break;case S.P1_INT:upP1Int();break;
    case S.P2:upP2();break;case S.P2_INT:upP2Int();break;
    case S.P3:upP3();break;case S.P4:upP4();break;case S.P5:upP5();break;
    case S.ENDING:upEnding();break;
  }
  ctx.restore();clicked=false;jumpPressed=false;requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
